<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account – WandaTools</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <style>
    /* ── Auth page layout ── */
    .auth-page {
      min-height: calc(100vh - 68px);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    /* ── Left side (branding) ── */
    .auth-brand {
      background: var(--gradient);
      padding: 60px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: var(--white);
      position: relative;
      overflow: hidden;
    }
    .auth-brand::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 80%, rgba(255,255,255,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 80% 20%, rgba(255,255,255,0.06) 0%, transparent 50%);
      pointer-events: none;
    }
    .auth-brand-content { position: relative; z-index: 1; }
    .auth-brand-content i { font-size: 4rem; margin-bottom: 20px; }
    .auth-brand-content h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; }
    .auth-brand-content p { font-size: 1rem; opacity: 0.85; max-width: 300px; line-height: 1.7; }

    /* ── Right side (form) ── */
    .auth-form-side {
      padding: 60px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .auth-form-wrap {
      max-width: 380px;
    }

    .auth-form-header {
      margin-bottom: 32px;
    }
    .auth-form-header h1 { font-size: 1.6rem; margin-bottom: 8px; }
    .auth-form-header p { color: var(--mid); font-size: 0.95rem; }

    /* ── Form toggle ── */
    .form-toggle {
      display: flex;
      background: var(--grey-bg);
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 28px;
      gap: 3px;
    }
    .form-toggle-btn {
      flex: 1;
      padding: 10px 12px;
      border-radius: 8px;
      border: none;
      background: transparent;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--mid);
      cursor: pointer;
      transition: var(--transition);
    }
    .form-toggle-btn.active {
      background: var(--white);
      color: var(--dark);
      box-shadow: var(--shadow-sm);
    }

    /* ── Form panels ── */
    .auth-panel { display: none; }
    .auth-panel.active { display: block; }

    .form-group { margin-bottom: 18px; }

    /* ── Password strength ── */
    .password-strength {
      margin-top: 8px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .strength-bar {
      height: 100%;
      width: 0;
      transition: width 0.3s, background-color 0.3s;
    }
    .strength-bar.weak { width: 33%; background: var(--red); }
    .strength-bar.fair { width: 66%; background: #F9A825; }
    .strength-bar.strong { width: 100%; background: var(--green); }

    /* ── Remember me ── */
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .checkbox-group input[type="checkbox"] {
      width: 18px; height: 18px; cursor: pointer;
    }
    .checkbox-group label { cursor: pointer; font-size: 0.9rem; color: var(--mid); }

    /* ── Forgot password ── */
    .forgot-link {
      text-align: right;
      margin-bottom: 20px;
    }
    .forgot-link a {
      font-size: 0.85rem;
      color: var(--blue);
      font-weight: 600;
      text-decoration: none;
      transition: color var(--transition);
    }
    .forgot-link a:hover { color: var(--green); }

    /* ── Social login ── */
    .social-login {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 28px 0;
    }
    .social-btn {
      padding: 12px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--white);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 600;
      font-size: 0.8rem;
      transition: var(--transition);
    }
    .social-btn:hover { border-color: var(--blue); background: var(--grey-bg); }
    .social-btn i { font-size: 1.1rem; }

    /* ── Divider ── */
    .form-divider {
      position: relative;
      margin: 24px 0;
      text-align: center;
      color: var(--light);
      font-size: 0.8rem;
    }
    .form-divider::before {
      content: '';
      position: absolute;
      inset: 50% 0 auto;
      height: 1px;
      background: var(--border);
    }
    .form-divider span { position: relative; background: var(--white); padding: 0 8px; }

    /* ── Switch auth type ── */
    .switch-auth {
      text-align: center;
      margin-top: 24px;
      font-size: 0.9rem;
      color: var(--mid);
    }
    .switch-auth a {
      color: var(--blue);
      font-weight: 600;
      text-decoration: none;
      transition: color var(--transition);
    }
    .switch-auth a:hover { color: var(--green); }

    /* ── Profile Dashboard (logged in) ── */
    .profile-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 32px;
      min-height: calc(100vh - 68px);
      padding: 40px;
      background: var(--grey-bg);
    }

    .profile-sidebar {
      background: var(--white);
      border-radius: var(--radius);
      padding: 28px 24px;
      box-shadow: var(--shadow-sm);
      height: fit-content;
      position: sticky;
      top: 88px;
    }

    .profile-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .profile-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 2rem;
      margin: 0 auto 16px;
    }
    .profile-header h2 { font-size: 1.2rem; margin-bottom: 4px; }
    .profile-header p { font-size: 0.85rem; color: var(--mid); }

    .profile-menu {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .profile-menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      border: none;
      background: transparent;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--mid);
      cursor: pointer;
      transition: var(--transition);
      text-align: left;
      width: 100%;
    }
    .profile-menu-item:hover { background: var(--grey-bg); color: var(--dark); }
    .profile-menu-item.active { background: var(--gradient); color: var(--white); }
    .profile-menu-item i { font-size: 1.1rem; }

    /* ── Profile panels ── */
    .profile-main {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow-sm);
    }

    .profile-panel { display: none; }
    .profile-panel.active { display: block; }

    .profile-panel h2 { font-size: 1.4rem; margin-bottom: 24px; }

    .profile-info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }
    .profile-info-row:last-child { border-bottom: none; }
    .profile-info-label { color: var(--mid); font-size: 0.9rem; font-weight: 600; }
    .profile-info-value { font-size: 0.95rem; color: var(--dark); }

    .profile-section {
      margin-bottom: 32px;
    }
    .profile-section h3 { font-size: 1.05rem; margin-bottom: 16px; }

    /* ── Danger zone ── */
    .danger-zone {
      background: #FFEBEE;
      border: 1.5px solid #EF5350;
      border-radius: var(--radius);
      padding: 24px;
      margin-top: 32px;
    }
    .danger-zone h4 { color: #C62828; margin-bottom: 12px; font-size: 0.95rem; }
    .danger-zone p { color: #E53935; font-size: 0.85rem; margin-bottom: 16px; }
    .danger-zone .btn { width: fit-content; }

    @media (max-width: 1024px) {
      .auth-page { grid-template-columns: 1fr; }
      .auth-brand { padding: 40px 24px; min-height: 300px; }
      .auth-form-side { padding: 40px 24px; }
      .profile-layout { grid-template-columns: 1fr; }
      .profile-sidebar { position: static; }
    }

    @media (max-width: 600px) {
      .auth-page { grid-template-columns: 1fr; }
      .auth-form-wrap { max-width: 100%; }
      .social-login { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <script src="nav.js"></script>
<script>
  window.addEventListener('load', initProfilePage);

  async function initProfilePage() {
    if (!WandaAuth.isLoggedIn()) {
      protectPage();
      return;
    }
    document.getElementById('authPage').style.display    = 'none';
    document.getElementById('profilePage').style.display = 'block';
    await loadProfile();
  }

  async function loadProfile() {
    try {
      const user = await apiCall('/auth/me');

      // Display name and email
      const name  = user.name  || WandaAuth.getName();
      const email = user.email || WandaAuth.getEmail();

      document.getElementById('profileName').textContent  = name;
      document.getElementById('profileEmail').textContent = email;
      document.getElementById('ovName').textContent       = name;
      document.getElementById('ovEmail').textContent      = email;

      if (document.getElementById('settingName'))
        document.getElementById('settingName').value = name;
      if (document.getElementById('settingEmail'))
        document.getElementById('settingEmail').value = email;

      document.getElementById('ovMemberDate').textContent =
        new Date(user.created_at || Date.now()).toLocaleDateString('en-ZA', {
          year: 'numeric', month: 'long', day: 'numeric'
        });

      // Load transaction count
      const stats = await apiCall('/users/me/stats');
      if (document.getElementById('ovTransactions'))
        document.getElementById('ovTransactions').textContent = stats.transaction_count || '0';

    } catch (error) {
      showToast('Failed to load profile: ' + error.message, 'error');
    }
  }

  /* ── Profile panels ── */
  function switchProfilePanel(panel, btn) {
    document.querySelectorAll('.profile-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.profile-menu-item').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + panel).classList.add('active');
    btn.classList.add('active');
  }

  /* ── Save settings ── */
  async function saveSettings() {
    const name     = document.getElementById('settingName')?.value.trim();
    const timezone = document.getElementById('settingTimezone')?.value;
    const currency = document.getElementById('settingCurrency')?.value;

    if (!name) { showToast('Name cannot be empty', 'error'); return; }

    try {
      const updated = await apiCall('/users/me', {
        method: 'PUT',
        body: JSON.stringify({
          name:     name     || undefined,
          timezone: timezone || undefined,
          currency: currency || undefined,
        }),
      });

      // Update localStorage so nav reflects changes immediately
      localStorage.setItem('user_name',     updated.name);
      localStorage.setItem('user_currency', updated.currency);

      document.getElementById('profileName').textContent  = updated.name;
      document.getElementById('profileEmail').textContent = updated.email;
      showToast('Settings saved successfully!');

    } catch (error) {
      showToast(error.message, 'error');
    }
  }

  /* ── Change password ── */
  async function changePassword() {
    const current   = document.getElementById('currentPassword')?.value;
    const newPwd    = document.getElementById('newPassword')?.value;
    const confirmPw = document.getElementById('confirmPassword')?.value;

    if (!current || !newPwd) { showToast('Please fill in all fields', 'error'); return; }
    if (newPwd !== confirmPw) { showToast('Passwords do not match', 'error'); return; }

    const strength = checkPasswordStrength(newPwd);
    if (!strength.is_strong) {
      showToast('Password is too weak: ' + strength.feedback[0], 'error');
      return;
    }

    try {
      await apiCall('/auth/change-password', {
        method: 'POST',
        body: JSON.stringify({ current_password: current, new_password: newPwd }),
      });
      showToast('Password changed successfully! Please sign in again on other devices.');
      if (document.getElementById('currentPassword')) document.getElementById('currentPassword').value = '';
      if (document.getElementById('newPassword'))     document.getElementById('newPassword').value = '';
      if (document.getElementById('confirmPassword')) document.getElementById('confirmPassword').value = '';
    } catch (error) {
      showToast(error.message, 'error');
    }
  }

  /* ── Logout ── */
  function handleLogout() {
    if (confirm('Are you sure you want to sign out?')) {
      WandaAuth.handleLogout();
    }
  }

  /* ── Delete account ── */
  async function deleteAccount() {
    if (!confirm('This will permanently delete your account and ALL data. This cannot be undone. Continue?')) return;
    if (!confirm('Are you absolutely sure?')) return;
    try {
      await apiCall('/users/me', { method: 'DELETE' });
      WandaAuth.auth.logout();
      showToast('Account deleted. Redirecting...', 'success');
      setTimeout(() => { location.href = '/'; }, 1500);
    } catch (error) {
      showToast(error.message, 'error');
    }
  }

  /* ── Password strength ── */
  function checkPwdStrength(fieldId) {
    const pwd = document.getElementById(fieldId)?.value || '';
    if (pwd) updateStrengthUI(fieldId, pwd);
  }
</script>
</body>
</html>
