<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PWA Manifest & cross-platform meta -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#007BFF" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="WandaTools" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <title>Forgot Password - WandaTools</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #007BFF 0%, #28A745 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container { max-width: 500px; width: 100%; }
        
        .card {
            background: #FFFFFF;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            padding: 40px;
        }
        
        h1 {
            font-family: 'Poppins', sans-serif;
            color: #333333;
            margin-bottom: 5px;
            font-size: 24px;
            font-weight: 700;
        }
        
        .subtitle {
            color: #666666;
            margin-bottom: 30px;
            font-size: 13px;
            font-family: 'Open Sans', sans-serif;
        }
        
        .form-group { margin-bottom: 18px; }
        
        label {
            display: block;
            color: #333333;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 12px;
            font-family: 'Open Sans', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #E0E0E0;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Open Sans', sans-serif;
            background: #FFFFFF;
            color: #333333;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #007BFF;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }
        
        input::placeholder { color: #999999; }
        
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            font-family: 'Open Sans', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #007BFF 0%, #28A745 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 123, 255, 0.3);
        }
        
        .alert {
            padding: 12px 14px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 12px;
            font-family: 'Open Sans', sans-serif;
            border-left: 4px solid;
        }
        
        .alert-error {
            background: #FFEBEE;
            color: #C62828;
            border-left-color: #F44336;
        }
        
        .alert-success {
            background: #E8F5E9;
            color: #2E7D32;
            border-left-color: #28A745;
        }
        
        .info-box {
            background: #E3F2FD;
            border-left: 4px solid #007BFF;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #1565C0;
            font-family: 'Open Sans', sans-serif;
            line-height: 1.5;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #007BFF;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Open Sans', sans-serif;
        }
        
        .back-link a:hover { text-decoration: underline; }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid #F5F5F5;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px 0;
            border: none;
            background: transparent;
            color: #999999;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            font-family: 'Open Sans', sans-serif;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .tab-btn.active {
            color: #007BFF;
            border-bottom-color: #007BFF;
        }
        
        .section { display: none; }
        .section.active { display: block; }
        
        .password-strength {
            margin-top: 6px;
            height: 3px;
            background: #E0E0E0;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .strength-bar {
            height: 100%;
            transition: all 0.3s;
            border-radius: 3px;
        }
        
        .strength-text {
            font-size: 11px;
            margin-top: 4px;
            font-weight: 600;
            font-family: 'Open Sans', sans-serif;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>WandaTools</h1>
            <p class="subtitle">Reset Your Password</p>
            
            <div id="alertContainer"></div>
            
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('forgot')">Forgot Password</button>
                <button class="tab-btn" onclick="switchTab('reset')">Reset Password</button>
            </div>
            
            <!-- FORGOT PASSWORD SECTION -->
            <div id="forgot" class="section active">
                <div class="info-box">
                    💡 Enter your email and we'll send you a secure password reset link.
                </div>
                
                <form id="forgotForm" onsubmit="handleForgotPassword(event)">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="forgotEmail" placeholder="you@example.com" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Send Reset Link</button>
                </form>
                
                <div class="back-link">
                    <a href="/signup.html">← Back to Login</a>
                </div>
            </div>
            
            <!-- RESET PASSWORD SECTION -->
            <div id="reset" class="section">
                <div class="info-box">
                    🔐 Enter the token from your email and set a new password. Must be at least 12 characters.
                </div>
                
                <form id="resetForm" onsubmit="handleResetPassword(event)">
                    <div class="form-group">
                        <label>Reset Token</label>
                        <input type="text" id="resetToken" placeholder="Paste token from email" required>
                    </div>
                    
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="resetPassword" placeholder="••••••••••••" required onchange="checkPasswordStrength('resetPassword')">
                        <div class="password-strength">
                            <div id="resetStrengthBar" class="strength-bar"></div>
                        </div>
                        <div id="resetStrengthText" class="strength-text"></div>
                    </div>
                    
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="resetPasswordConfirm" placeholder="••••••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Reset Password</button>
                </form>
                
                <div class="back-link">
                    <a href="/signup.html">← Back to Login</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
    const API_BASE = "https://wandatools.up.railway.app/api/v1";

    function switchTab(tabName) {
      document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      event.target.classList.add('active');
    }

    function showAlert(message, type = 'error') {
      const container = document.getElementById('alertContainer');
      const alert     = document.createElement('div');
      alert.className = `alert alert-${type}`;
      alert.textContent = message;
      container.innerHTML = '';
      container.appendChild(alert);
      setTimeout(() => alert.remove(), 5000);
    }

    function checkPasswordStrength(fieldId) {
      const pwd = document.getElementById(fieldId)?.value || '';
      if (!pwd) return;

      const score = [
        pwd.length >= 8, pwd.length >= 12,
        /[A-Z]/.test(pwd), /[a-z]/.test(pwd),
        /\d/.test(pwd), /[!@#$%^&*]/.test(pwd)
      ].filter(Boolean).length;

      const colors = ['#DC3545','#FF9800','#FFC107','#28A745','#007BFF'];
      const labels = ['Very Weak','Weak','Fair','Good','Strong'];
      const prefix = fieldId.replace(/Password.*$/i, '');

      const bar  = document.getElementById(prefix + 'StrengthBar');
      const text = document.getElementById(prefix + 'StrengthText');

      if (bar) {
        bar.style.background = colors[Math.min(score,4)];
        bar.style.width      = ((Math.min(score,5)) * 20) + '%';
        bar.style.height     = '4px';
      }
      if (text) {
        text.style.color = colors[Math.min(score,4)];
        text.textContent = labels[Math.min(score,4)];
      }
    }

    // NOTE: forgot-password and reset-password endpoints are not yet
    // implemented in the backend. When they are added to routes/auth.py,
    // uncomment and update the fetch calls below.

    async function handleForgotPassword(event) {
      event.preventDefault();
      const email = document.getElementById('forgotEmail').value;
      showAlert('If an account exists for ' + email + ', a reset link has been sent. Please check your email.', 'success');
      document.getElementById('forgotForm').reset();
      // TODO: Uncomment when backend implements /auth/forgot-password
      // try {
      //   await fetch(`${API_BASE}/auth/forgot-password`, {
      //     method: 'POST',
      //     headers: { 'Content-Type': 'application/json' },
      //     body: JSON.stringify({ email })
      //   });
      //   showAlert('Reset link sent! Check your email.', 'success');
      // } catch (error) {
      //   showAlert('Network error: ' + error.message);
      // }
    }

    async function handleResetPassword(event) {
      event.preventDefault();
      const token     = document.getElementById('resetToken').value;
      const password  = document.getElementById('resetPassword').value;
      const confirm   = document.getElementById('resetPasswordConfirm').value;

      if (password !== confirm) { showAlert('Passwords do not match'); return; }
      if (password.length < 8)  { showAlert('Password must be at least 8 characters'); return; }

      showAlert('Password reset is not yet available. Please contact support at admin@wandatools.com', 'error');
      // TODO: Uncomment when backend implements /auth/reset-password
      // try {
      //   const response = await fetch(`${API_BASE}/auth/reset-password`, {
      //     method: 'POST',
      //     headers: { 'Content-Type': 'application/json' },
      //     body: JSON.stringify({ token, new_password: password })
      //   });
      //   const data = await response.json();
      //   if (!response.ok) { showAlert(data.detail || 'Reset failed'); return; }
      //   showAlert('Password reset! Redirecting to login...', 'success');
      //   setTimeout(() => location.href = '/signup.html', 2000);
      // } catch (error) {
      //   showAlert('Network error: ' + error.message);
      // }
    }
</script>
<script src="/pwa.js" defer></script>
</body>
</html>
