<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tools Dashboard – WandaTools</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <style>
    /* ── Layout ── */
    .tools-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: calc(100vh - 68px);
    }

    /* ── Sidebar ── */
    .sidebar {
      background: #1A1A2E;
      padding: 32px 0;
      position: sticky;
      top: 68px;
      height: calc(100vh - 68px);
      overflow-y: auto;
    }
    .sidebar-section {
      padding: 0 16px;
      margin-bottom: 8px;
    }
    .sidebar-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      padding: 12px 12px 8px;
      font-family: 'Poppins', sans-serif;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-radius: 10px;
      color: rgba(255,255,255,0.6);
      font-size: 0.875rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 2px;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .sidebar-item i { font-size: 1.1rem; }
    .sidebar-item:hover { background: rgba(255,255,255,0.07); color: var(--white); }
    .sidebar-item.active {
      background: var(--gradient);
      color: var(--white);
      box-shadow: 0 4px 16px rgba(0,123,255,0.3);
    }
    .sidebar-item .badge-count {
      margin-left: auto;
      background: rgba(255,255,255,0.15);
      color: var(--white);
      font-size: 0.7rem;
      padding: 2px 7px;
      border-radius: 50px;
    }
    .sidebar-item.active .badge-count { background: rgba(255,255,255,0.25); }

    /* ── Main area ── */
    .tools-main { background: var(--grey-bg); padding: 32px; }

    /* ── Panel (each tab content) ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Page header ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .page-header h1 { font-size: 1.6rem; }
    .page-header p { color: var(--mid); font-size: 0.9rem; margin-top: 4px; }

    /* ── Summary stat row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .mini-stat {
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
    }
    .mini-stat .ms-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--mid);
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
    }
    .mini-stat .ms-value {
      font-family: 'Poppins', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      margin: 6px 0 4px;
    }
    .mini-stat .ms-change {
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .ms-up { color: var(--green); }
    .ms-down { color: var(--red); }

    /* ── Card white box ── */
    .white-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .white-card h3 {
      font-size: 1rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .white-card h3 i { color: var(--blue); }

    /* ── Transaction form ── */
    .txn-form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 16px;
    }
    .txn-type-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .type-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 2px solid var(--border);
      background: var(--white);
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .type-btn.buy.active { background: #E8F5E9; border-color: var(--green); color: var(--green); }
    .type-btn.sell.active { background: #FFEBEE; border-color: var(--red); color: var(--red); }
    .type-btn:not(.active):hover { border-color: var(--blue); color: var(--blue); }

    /* ── Chart placeholder ── */
    .chart-wrap {
      width: 100%;
      height: 220px;
      position: relative;
    }
    canvas { width: 100% !important; height: 100% !important; }

    /* ── Document export cards ── */
    .doc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }
    .doc-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      text-align: center;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
    }
    .doc-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
    .doc-card .doc-icon {
      width: 60px; height: 60px;
      border-radius: 14px;
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 1.6rem;
      color: var(--white);
    }
    .doc-card h4 { font-size: 1rem; margin-bottom: 8px; }
    .doc-card p { font-size: 0.82rem; color: var(--mid); margin-bottom: 20px; line-height: 1.5; }

    /* ── Notification list ── */
    .notif-list { display: flex; flex-direction: column; gap: 12px; }
    .notif-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 16px;
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
    }
    .notif-item:hover { border-color: var(--blue); box-shadow: var(--shadow-md); }
    .notif-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .notif-icon.green { background: #E8F5E9; color: var(--green); }
    .notif-icon.blue  { background: #E3F2FD; color: var(--blue); }
    .notif-icon.red   { background: #FFEBEE; color: var(--red); }
    .notif-icon.warn  { background: #FFF8E1; color: #F9A825; }
    .notif-body .notif-title { font-weight: 600; font-size: 0.9rem; font-family: 'Poppins', sans-serif; }
    .notif-body .notif-msg { font-size: 0.82rem; color: var(--mid); margin-top: 3px; }
    .notif-time { margin-left: auto; font-size: 0.75rem; color: var(--light); white-space: nowrap; }

    /* ── Bar chart (pure CSS) ── */
    .bar-chart-wrap { display: flex; align-items: flex-end; gap: 10px; height: 180px; padding: 0 4px; }
    .bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .bar-pair { display: flex; gap: 3px; align-items: flex-end; width: 100%; }
    .bar {
      flex: 1;
      border-radius: 4px 4px 0 0;
      transition: opacity 0.2s;
      min-height: 4px;
    }
    .bar:hover { opacity: 0.8; }
    .bar.income { background: var(--blue); }
    .bar.expense { background: var(--green); }
    .bar-label { font-size: 0.7rem; color: var(--mid); font-family: 'Poppins', sans-serif; }
    .chart-legend { display: flex; gap: 16px; margin-top: 12px; }
    .legend-dot {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.78rem; color: var(--mid);
    }
    .legend-dot::before {
      content: ''; width: 10px; height: 10px; border-radius: 3px;
    }
    .legend-dot.income::before { background: var(--blue); }
    .legend-dot.expense::before { background: var(--green); }

    /* ── Locked overlay ── */
    .locked-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(26,26,46,0.92);
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px);
    }
    .locked-box {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .locked-box i { font-size: 3rem; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .locked-box h2 { margin: 16px 0 10px; font-size: 1.4rem; }
    .locked-box p { color: var(--mid); font-size: 0.9rem; margin-bottom: 28px; }
    .locked-box .btn { width: 100%; justify-content: center; margin-bottom: 10px; }

    @media (max-width: 768px) {
      .tools-layout { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; display: flex; overflow-x: auto; padding: 12px; gap: 4px; }
      .sidebar-section { display: flex; gap: 4px; padding: 0; }
      .sidebar-label { display: none; }
      .sidebar-item { white-space: nowrap; flex-direction: column; gap: 4px; padding: 10px 14px; font-size: 0.75rem; }
      .sidebar-item .badge-count { display: none; }
      .tools-main { padding: 20px 16px; }
    }
  </style>
</head>
<body>


<script src="nav.js"></script>
<script>
  /* ── Auth gate ── */
  protectPage();

  const overlay = document.getElementById('lockedOverlay');
  if (overlay) overlay.style.display = 'none';

  /* ── Greet + date ── */
  document.getElementById('dashGreetName').textContent = WandaAuth.getName().split(' ')[0];
  document.getElementById('dashDate').textContent = new Date().toLocaleDateString('en-ZA', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  /* ── Panel switcher ── */
  function showPanel(panelId) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    const panel = document.getElementById(panelId);
    if (panel) panel.classList.add('active');
    if (panelId === 'txnPanel')  loadTransactions();
    if (panelId === 'dashPanel') loadDashboard();
  }

  /* ── Transaction state ── */
  let transactions = [];
  let txnType = 'income';

  function setTxnType(type) {
    txnType = type;
    document.getElementById('btnBuy').classList.toggle('active',  type === 'income');
    document.getElementById('btnSell').classList.toggle('active', type === 'expense');
  }

  document.getElementById('txnDate').value = new Date().toISOString().split('T')[0];

  /* ── Load dashboard ── */
  async function loadDashboard() {
    try {
      const summary = await apiCall('/tools/dashboard/summary');
      const currency = summary.currency || WandaAuth.getCurrency();

      document.querySelectorAll('.mini-stat')[0].innerHTML = `
        <div class="mini-stat-label">Total Income</div>
        <div class="mini-stat-value" style="color:var(--green);">${formatCurrency(summary.total_income, currency)}</div>`;

      document.querySelectorAll('.mini-stat')[1].innerHTML = `
        <div class="mini-stat-label">Total Expenses</div>
        <div class="mini-stat-value" style="color:var(--red);">${formatCurrency(summary.total_expenses, currency)}</div>`;

      document.querySelectorAll('.mini-stat')[2].innerHTML = `
        <div class="mini-stat-label">Net Profit</div>
        <div class="mini-stat-value" style="color:var(--blue);">${formatCurrency(summary.net_profit, currency)}</div>`;

      document.querySelectorAll('.mini-stat')[3].innerHTML = `
        <div class="mini-stat-label">Transactions</div>
        <div class="mini-stat-value">${summary.transaction_count}</div>`;

      await loadChartHistory(currency);
    } catch (error) {
      showToast('Failed to load dashboard: ' + error.message, 'error');
    }
  }

  /* ── Load chart history ── */
  async function loadChartHistory(currency) {
    try {
      const data = await apiCall('/tools/dashboard/history?months=6');
      const summaries = data.summaries || [];
      const months     = summaries.map(s => s.month.slice(5));
      const incomeData  = summaries.map(s => s.total_income);
      const expenseData = summaries.map(s => s.total_expenses);
      const maxVal = Math.max(...incomeData, ...expenseData, 1);

      const chartEl = document.getElementById('barChart');
      if (!chartEl) return;
      chartEl.innerHTML = months.map((m, i) => `
        <div class="bar-group">
          <div class="bar-pair">
            <div class="bar income"  style="height:${(incomeData[i]/maxVal)*160}px"
                 title="Income: ${formatCurrency(incomeData[i], currency)}"></div>
            <div class="bar expense" style="height:${(expenseData[i]/maxVal)*160}px"
                 title="Expenses: ${formatCurrency(expenseData[i], currency)}"></div>
          </div>
          <div class="bar-label">${m}</div>
        </div>`).join('');
    } catch { /* chart fails silently */ }
  }

  /* ── Load transactions ── */
  async function loadTransactions() {
    try {
      const data = await apiCall('/tools/transactions?limit=100');
      transactions = data.items || [];
      renderTransactions();
    } catch (error) {
      showToast('Failed to load transactions: ' + error.message, 'error');
    }
  }

  /* ── Add transaction ── */
  async function addTransaction() {
    const desc   = document.getElementById('txnDesc').value.trim();
    const amount = parseFloat(document.getElementById('txnAmount').value);
    const cat    = document.getElementById('txnCategory').value;
    const date   = document.getElementById('txnDate').value;

    if (!desc || !amount || !date) {
      showToast('Please fill in all fields.', 'error');
      return;
    }

    try {
      const newTxn = await apiCall('/tools/transactions', {
        method: 'POST',
        body: JSON.stringify({
          type:             txnType,
          amount:           amount,
          category:         cat,
          description:      desc,
          transaction_date: new Date(date).toISOString(),
        }),
      });

      transactions.unshift(newTxn);
      renderTransactions();

      document.getElementById('txnDesc').value   = '';
      document.getElementById('txnAmount').value = '';
      document.getElementById('txnDate').value   = new Date().toISOString().split('T')[0];
      showToast('Transaction saved!');
    } catch (error) {
      showToast(error.message, 'error');
    }
  }

  /* ── Delete transaction ── */
  async function deleteTxn(id) {
    if (!confirm('Delete this transaction?')) return;
    try {
      await apiCall(`/tools/transactions/${id}`, { method: 'DELETE' });
      transactions = transactions.filter(t => t.id !== id);
      renderTransactions();
      showToast('Transaction deleted.');
    } catch (error) {
      showToast(error.message, 'error');
    }
  }

  /* ── Render transactions ── */
  function renderTransactions() {
    const currency = WandaAuth.getCurrency();
    const rows = (transactions.length ? transactions : demoTxns).map(t => {
      const isIncome = t.type === 'income';
      const date     = t.transaction_date ? t.transaction_date.split('T')[0] : (t.date || '');
      const desc     = t.description || t.desc || '';
      const cat      = t.category    || t.cat  || '';
      const amt      = Number(t.amount || 0);
      return `<tr>
        <td>${date}</td>
        <td>${desc}</td>
        <td><span class="badge badge-blue">${cat}</span></td>
        <td><span class="badge ${isIncome ? 'badge-green' : 'badge-red'}">${isIncome ? 'Income' : 'Expense'}</span></td>
        <td style="font-weight:700;color:${isIncome ? 'var(--green)' : 'var(--red)'}">
          ${isIncome ? '+' : '-'} ${formatCurrency(amt, t.currency || currency)}
        </td>
        <td>${t.id ? `<button onclick="deleteTxn(${t.id})"
          style="background:none;border:none;cursor:pointer;color:var(--red)">
          <i class="material-icons" style="font-size:1rem;">delete</i></button>` : ''}</td>
      </tr>`;
    }).join('');

    const tbody  = document.getElementById('txnTableBody');
    const recent = document.getElementById('recentTxnBody');
    if (tbody)  tbody.innerHTML  = rows;
    if (recent) recent.innerHTML = (transactions.length ? transactions : demoTxns)
      .slice(0, 5).map(t => {
        const isIncome = t.type === 'income';
        const date     = t.transaction_date ? t.transaction_date.split('T')[0] : (t.date || '');
        const desc     = t.description || t.desc || '';
        const cat      = t.category    || t.cat  || '';
        const amt      = Number(t.amount || 0);
        return `<tr>
          <td>${date}</td><td>${desc}</td>
          <td><span class="badge badge-blue">${cat}</span></td>
          <td><span class="badge ${isIncome ? 'badge-green' : 'badge-red'}">${isIncome ? 'Income' : 'Expense'}</span></td>
          <td style="font-weight:700;color:${isIncome ? 'var(--green)' : 'var(--red)'}">
            ${isIncome ? '+' : '-'} ${formatCurrency(amt, t.currency || currency)}
          </td><td></td>
        </tr>`;
      }).join('');
  }

  /* ── Demo data (shown until real transactions load) ── */
  const demoTxns = [
    {id:0,date:'2025-06-10',desc:'Client Invoice #101', cat:'Services', type:'income',  amount:15000},
    {id:0,date:'2025-06-09',desc:'Stock purchase',      cat:'Stock',    type:'expense', amount:4200},
    {id:0,date:'2025-06-08',desc:'Monthly rent',        cat:'Rent',     type:'expense', amount:6500},
    {id:0,date:'2025-06-07',desc:'Product sales',       cat:'Sales',    type:'income',  amount:9800},
    {id:0,date:'2025-06-05',desc:'Marketing ads',       cat:'Marketing',type:'expense', amount:1800},
  ];
  renderTransactions();

  /* ── Document export ── */
  function generateDoc(type) {
    showToast(`${type} report is being prepared — download will start shortly.`);
  }

  /* ── Notifications ── */
  function clearNotifs() {
    document.querySelectorAll('.notif-item').forEach(n => n.style.opacity = '0.4');
    showToast('All notifications marked as read.');
  }

  /* ── Load dashboard on page load ── */
  loadDashboard();
</script>
</body>
</html>
