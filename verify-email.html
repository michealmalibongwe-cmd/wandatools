<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - WandaTools</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #007BFF 0%, #28A745 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container { max-width: 500px; width: 100%; }
        
        .card {
            background: #FFFFFF;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            padding: 40px;
            text-align: center;
        }
        
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-family: 'Poppins', sans-serif;
            color: #333333;
            margin-bottom: 10px;
            font-size: 24px;
            font-weight: 700;
        }
        
        p {
            color: #666666;
            margin-bottom: 20px;
            line-height: 1.6;
            font-size: 13px;
        }
        
        .spinner {
            border: 4px solid #F5F5F5;
            border-top: 4px solid #007BFF;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .success { color: #28A745; }
        .error { color: #F44336; }
        
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #007BFF 0%, #28A745 100%);
            color: white;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            font-size: 13px;
            font-family: 'Open Sans', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 123, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div id="content">
                <div class="spinner"></div>
                <h1>Verifying Email</h1>
                <p>Please wait while we verify your email address...</p>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = "https://your-railway-url/api/v1";
        
        async function verifyEmail() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            
            if (!token) {
                showError('No verification token provided');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/auth/verify-email?token=${token}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    showError(data.detail || 'Verification failed');
                    return;
                }
                
                showSuccess('Email verified successfully! Redirecting to login...');
                setTimeout(() => location.href = '/signup.html', 2000);
                
            } catch (error) {
                showError('Network error: ' + error.message);
            }
        }
        
        function showSuccess(message) {
            document.getElementById('content').innerHTML = `
                <div class="icon success">✓</div>
                <h1 class="success">Email Verified!</h1>
                <p>${message}</p>
            `;
        }
        
        function showError(message) {
            document.getElementById('content').innerHTML = `
                <div class="icon error">✗</div>
                <h1 class="error">Verification Failed</h1>
                <p>${message}</p>
                <button class="btn" onclick="location.href='/signup.html'">Back to Login</button>
            `;
        }
        
        verifyEmail();
    </script>
</body>
</html>
