<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WandaAI – Your AI Financial Assistant</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <style>
    /* ── AI Page layout ── */
    .ai-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: calc(100vh - 68px);
      overflow: hidden;
    }

    /* ── Left panel ── */
    .ai-sidebar {
      background: #1A1A2E;
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      overflow-y: auto;
      gap: 8px;
    }
    .ai-sidebar-title {
      font-family: 'Poppins', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      padding: 4px 8px 10px;
    }
    .ai-mode-btn {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      transition: var(--transition);
      text-align: left;
      width: 100%;
    }
    .ai-mode-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }
    .ai-mode-btn.active { background: var(--gradient); border-color: transparent; color: var(--white); }
    .ai-mode-btn i { font-size: 1.3rem; flex-shrink: 0; margin-top: 2px; }
    .ai-mode-btn .mode-name { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 0.875rem; }
    .ai-mode-btn .mode-desc { font-size: 0.75rem; opacity: 0.75; margin-top: 3px; line-height: 1.4; }

    .ai-sidebar-divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 8px 0;
    }

    .prompt-library {
      margin-top: 4px;
    }
    .prompt-chip {
      display: block;
      width: 100%;
      text-align: left;
      padding: 9px 12px;
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.6);
      font-size: 0.78rem;
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .prompt-chip:hover { background: rgba(255,255,255,0.1); color: var(--white); border-color: rgba(255,255,255,0.2); }

    /* ── Chat area ── */
    .chat-area {
      display: flex;
      flex-direction: column;
      background: var(--grey-bg);
    }

    /* Chat header */
    .chat-header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .ai-avatar {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: var(--gradient);
      display: flex; align-items: center; justify-content: center;
      color: var(--white);
      font-size: 1.4rem;
      flex-shrink: 0;
      animation: pulse-glow 3s ease-in-out infinite;
    }
    .chat-header-info h3 { font-size: 1rem; }
    .chat-header-info span {
      font-size: 0.78rem;
      color: var(--green);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .online-dot {
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      display: inline-block;
    }
    .chat-header-actions { margin-left: auto; display: flex; gap: 8px; }
    .icon-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--white);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      color: var(--mid);
    }
    .icon-btn:hover { background: var(--grey-bg); color: var(--dark); }

    /* Messages */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { display: flex; gap: 10px; max-width: 78%; }
    .msg.user { margin-left: auto; flex-direction: row-reverse; }

    .msg-avatar {
      width: 34px; height: 34px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .msg.ai .msg-avatar { background: var(--gradient); color: var(--white); }
    .msg.user .msg-avatar { background: var(--grey-bg); border: 1px solid var(--border); color: var(--mid); }

    .msg-bubble {
      padding: 13px 16px;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.65;
      max-width: 100%;
    }
    .msg.ai .msg-bubble {
      background: var(--white);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      box-shadow: var(--shadow-sm);
    }
    .msg.user .msg-bubble {
      background: var(--gradient);
      color: var(--white);
      border-top-right-radius: 4px;
    }

    .msg-time { font-size: 0.7rem; color: var(--light); margin-top: 4px; }
    .msg.user .msg-time { text-align: right; }

    /* AI typing indicator */
    .typing-indicator {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .typing-dots { display: flex; gap: 4px; align-items: center; padding: 13px 16px; }
    .typing-dots span {
      width: 7px; height: 7px;
      background: var(--mid);
      border-radius: 50%;
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* Insight cards inside AI messages */
    .insight-card {
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 10px;
      background: var(--grey-bg);
      border-left: 3px solid var(--blue);
      font-size: 0.85rem;
    }
    .insight-card strong { display: block; margin-bottom: 4px; font-family: 'Poppins', sans-serif; }

    /* Chat input */
    .chat-input-wrap {
      background: var(--white);
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      flex-shrink: 0;
    }
    .chat-input-inner {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--grey-bg);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 10px 14px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .chat-input-inner:focus-within {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
    }
    #chatInput {
      flex: 1;
      border: none;
      background: transparent;
      font-family: 'Open Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--dark);
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
    }
    #chatInput::placeholder { color: var(--light); }
    .send-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: var(--gradient);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--white);
      flex-shrink: 0;
      transition: var(--transition);
    }
    .send-btn:hover { opacity: 0.85; transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .input-hint {
      text-align: center;
      font-size: 0.73rem;
      color: var(--light);
      margin-top: 8px;
    }

    /* ── Capabilities section ── */
    .capabilities-banner {
      background: var(--white);
      border-top: 1px solid var(--border);
      padding: 20px 24px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      flex-shrink: 0;
    }
    .cap-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: var(--mid);
    }
    .cap-item i { font-size: 1rem; color: var(--blue); }

    @media (max-width: 768px) {
      .ai-layout { grid-template-columns: 1fr; height: auto; }
      .ai-sidebar { display: none; }
      .chat-area { height: calc(100vh - 68px); }
      .capabilities-banner { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <!-- ══ NAVBAR — populated by nav.js ══ -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Wanda<span>Tools</span></a>
      <ul class="nav-links" role="list"></ul>
      <div id="navAuth"></div>
    </div>
  </nav>

  <!-- ══ AI LAYOUT ══ -->
  <div class="ai-layout" style="margin-top:68px;">

    <!-- Sidebar -->
    <aside class="ai-sidebar">
      <div class="ai-sidebar-title">AI Mode</div>

      <button class="ai-mode-btn active" onclick="setMode('insights', this)">
        <i class="material-icons">insights</i>
        <div>
          <div class="mode-name">Financial Insights</div>
          <div class="mode-desc">Analyse your income, expenses &amp; trends</div>
        </div>
      </button>

      <button class="ai-mode-btn" onclick="setMode('recommendations', this)">
        <i class="material-icons">lightbulb</i>
        <div>
          <div class="mode-name">Smart Recommendations</div>
          <div class="mode-desc">Get personalised advice to save &amp; grow</div>
        </div>
      </button>

      <button class="ai-mode-btn" onclick="setMode('business', this)">
        <i class="material-icons">business_center</i>
        <div>
          <div class="mode-name">Business Assistant</div>
          <div class="mode-desc">Funding prep, cash-flow planning &amp; more</div>
        </div>
      </button>

      <div class="ai-sidebar-divider"></div>
      <div class="ai-sidebar-title">Quick Prompts</div>

      <div class="prompt-library">
        <button class="prompt-chip" onclick="sendPrompt('Summarise my income and expenses this month')">
          Summarise my income &amp; expenses
        </button>
        <button class="prompt-chip" onclick="sendPrompt('Where can I cut costs in my business?')">
          Where can I cut costs?
        </button>
        <button class="prompt-chip" onclick="sendPrompt('How do I prepare for a business loan application?')">
          Prepare for a loan application
        </button>
        <button class="prompt-chip" onclick="sendPrompt('What is my biggest expense category?')">
          Biggest expense category?
        </button>
        <button class="prompt-chip" onclick="sendPrompt('Give me a cash-flow forecast for next month')">
          Cash-flow forecast
        </button>
      </div>
    </aside>

    <!-- Chat area -->
    <div class="chat-area">

      <!-- Header -->
      <div class="chat-header">
        <div class="ai-avatar"><i class="material-icons">smart_toy</i></div>
        <div class="chat-header-info">
          <h3>WandaAI</h3>
          <span><span class="online-dot"></span> Online — ready to help</span>
        </div>
        <div class="chat-header-actions">
          <button class="icon-btn" onclick="clearChat()" title="Clear chat">
            <i class="material-icons">refresh</i>
          </button>
        </div>
      </div>

      <!-- Messages -->
      <div class="chat-messages" id="chatMessages"></div>

      <!-- Input -->
      <div class="chat-input-wrap">
        <div class="chat-input-inner">
          <textarea id="chatInput" rows="1" placeholder="Ask WandaAI anything about your finances…"
                    oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
          <button id="sendBtn" class="send-btn" onclick="sendMessage()" title="Send">
            <i class="material-icons">send</i>
          </button>
        </div>
        <p class="input-hint">Press Enter to send · Shift+Enter for a new line</p>
      </div>

      <!-- Capabilities bar -->
      <div class="capabilities-banner">
        <div class="cap-item"><i class="material-icons">analytics</i> Transaction analysis</div>
        <div class="cap-item"><i class="material-icons">trending_up</i> Growth insights</div>
        <div class="cap-item"><i class="material-icons">security</i> Secure &amp; private</div>
      </div>

    </div><!-- /.chat-area -->
  </div><!-- /.ai-layout -->

  <!-- nav.js after DOM so renderNavigation() finds .nav-links and #navAuth -->
  <script src="nav.js"></script>
  <script>
    // Module-level state — assigned inside DOMContentLoaded once elements exist
    let currentMode  = 'insights';
    let chatMessages = null;
    let chatInput    = null;
    let sendBtn      = null;

    const welcomeMsg = `Hello! 👋 I'm **WandaAI**, your personal financial assistant.\n\nI can help you understand your cash flow, find areas to save, plan for growth, and prepare for funding applications.\n\nWhat would you like to explore today?`;

    document.addEventListener('DOMContentLoaded', () => {
      protectPage();

      chatMessages = document.getElementById('chatMessages');
      chatInput    = document.getElementById('chatInput');
      sendBtn      = document.getElementById('sendBtn');

      const name = WandaAuth.isLoggedIn() ? WandaAuth.getName().split(' ')[0] : '';
      const greeting = name
        ? welcomeMsg.replace('Hello!', `Hello, ${name}!`)
        : welcomeMsg;

      addMessage('ai', greeting);
    });

    function addMessage(role, text, insightCard = null) {
      if (!chatMessages) return null;

      const now       = new Date().toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });
      const div       = document.createElement('div');
      div.className   = `msg ${role}`;
      const icon      = role === 'ai' ? 'smart_toy' : 'person';
      const formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
      const insightHTML = insightCard
        ? `<div class="insight-card"><strong>${insightCard.title}</strong>${insightCard.body}</div>` : '';
      div.innerHTML = `
        <div class="msg-avatar"><i class="material-icons">${icon}</i></div>
        <div>
          <div class="msg-bubble">${formatted}${insightHTML}</div>
          <div class="msg-time">${now}</div>
        </div>`;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return div;
    }

    function showTyping() {
      if (!chatMessages) return;
      const div = document.createElement('div');
      div.className = 'msg ai typing-indicator';
      div.id = 'typingIndicator';
      div.innerHTML = `
        <div class="msg-avatar"><i class="material-icons">smart_toy</i></div>
        <div class="msg-bubble" style="padding:0;">
          <div class="typing-dots"><span></span><span></span><span></span></div>
        </div>`;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function hideTyping() {
      const t = document.getElementById('typingIndicator');
      if (t) t.remove();
    }

    async function sendMessage() {
      if (!chatInput || !sendBtn) return;
      const text = chatInput.value.trim();
      if (!text) return;

      chatInput.value = '';
      autoResize(chatInput);
      sendBtn.disabled = true;
      addMessage('user', text);
      showTyping();

      try {
        const response = await apiCall('/wandaai/query', {
          method: 'POST',
          body: JSON.stringify({ question: text, mode: currentMode }),
        });
        hideTyping();
        addMessage('ai', response.response);
        if (response.recommendations && response.recommendations.length > 0) {
          showToast('💡 ' + response.recommendations[0], 'info');
        }
      } catch (error) {
        hideTyping();
        addMessage('ai', 'Sorry, I encountered an error. Please try again.');
        console.error('WandaAI error:', error);
      } finally {
        sendBtn.disabled = false;
        if (chatInput) chatInput.focus();
      }
    }

    function sendPrompt(text) {
      if (!chatInput) return;
      chatInput.value = text;
      sendMessage();
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function setMode(mode, btn) {
      currentMode = mode;
      document.querySelectorAll('.ai-mode-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      const names = {
        insights:        'Financial Insights',
        recommendations: 'Smart Recommendations',
        business:        'Business Assistant',
      };
      addMessage('ai', `Switched to **${names[mode] || mode}** mode. How can I help you today?`);
    }

    function clearChat() {
      if (!chatMessages) return;
      chatMessages.innerHTML = '';
      addMessage('ai', welcomeMsg);
    }
  </script>
</body>
</html>
