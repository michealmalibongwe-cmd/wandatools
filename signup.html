<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WandaTools - Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #007BFF 0%, #28A745 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container { max-width: 500px; width: 100%; }
        
        .card {
            background: #FFFFFF;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            padding: 40px;
        }
        
        h1 {
            font-family: 'Poppins', sans-serif;
            color: #333333;
            margin-bottom: 5px;
            font-size: 28px;
            font-weight: 700;
        }
        
        .subtitle {
            color: #666666;
            margin-bottom: 30px;
            font-size: 13px;
            font-family: 'Open Sans', sans-serif;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        label {
            display: block;
            color: #333333;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 12px;
            font-family: 'Open Sans', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #E0E0E0;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Open Sans', sans-serif;
            background: #FFFFFF;
            color: #333333;
            transition: all 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #007BFF;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
            background: #FFFFFF;
        }
        
        input::placeholder {
            color: #999999;
        }
        
        /* Password Strength Indicator */
        .password-strength {
            margin-top: 6px;
            height: 3px;
            background: #E0E0E0;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
            border-radius: 3px;
        }
        
        .strength-0 { width: 20%; background: #F44336; }
        .strength-1 { width: 40%; background: #FF9800; }
        .strength-2 { width: 60%; background: #FFC107; }
        .strength-3 { width: 80%; background: #28A745; }
        .strength-4 { width: 100%; background: #007BFF; }
        
        .strength-text {
            font-size: 11px;
            margin-top: 4px;
            font-weight: 600;
            font-family: 'Open Sans', sans-serif;
        }
        
        .strength-weak { color: #F44336; }
        .strength-fair { color: #FF9800; }
        .strength-good { color: #28A745; }
        .strength-strong { color: #007BFF; }
        
        .feedback {
            font-size: 11px;
            color: #999999;
            margin-top: 4px;
            font-family: 'Open Sans', sans-serif;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            font-family: 'Open Sans', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #007BFF 0%, #28A745 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 123, 255, 0.3);
        }
        
        .btn-secondary {
            background: #F5F5F5;
            color: #333333;
            border: 1px solid #E0E0E0;
        }
        
        .btn-secondary:hover {
            background: #EEEEEE;
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .form-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid #F5F5F5;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px 0;
            border: none;
            background: transparent;
            color: #999999;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            font-family: 'Open Sans', sans-serif;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .tab-btn.active {
            color: #007BFF;
            border-bottom-color: #007BFF;
        }
        
        .form-section { display: none; }
        .form-section.active { display: block; }
        
        .alert {
            padding: 12px 14px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 12px;
            font-family: 'Open Sans', sans-serif;
            border-left: 4px solid;
        }
        
        .alert-error {
            background: #FFEBEE;
            color: #C62828;
            border-left-color: #F44336;
        }
        
        .alert-success {
            background: #E8F5E9;
            color: #2E7D32;
            border-left-color: #28A745;
        }
        
        .toggle-form {
            text-align: center;
            margin-top: 20px;
            color: #999999;
            font-size: 12px;
        }
        
        .toggle-form a {
            color: #007BFF;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        
        .toggle-form a:hover { text-decoration: underline; }
        
        h3 {
            font-family: 'Poppins', sans-serif;
            color: #333333;
            font-size: 14px;
            margin-bottom: 15px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <script src="nav.js"></script>
    <script>
        if (!WandaAuth.protectFromAuth()) {
            // User already logged in, redirected
        }
    </script>
    
    <!-- Rest of signup.html content below -->
    

    <div class="container">
        <div class="card">
            <h1>WandaTools</h1>
            <p class="subtitle">Secure Financial Management Platform</p>
            
            <div id="alertContainer"></div>
            
            <!-- Tabs -->
            <div class="form-tabs">
                <button class="tab-btn active" onclick="switchForm('individual')">Individual</button>
                <button class="tab-btn" onclick="switchForm('business')">Business</button>
                <button class="tab-btn" onclick="switchForm('login')">Sign In</button>
            </div>
            
            <!-- INDIVIDUAL SIGNUP -->
            <div id="individual" class="form-section active">
                <form id="individualForm" onsubmit="handleIndividualSignup(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="indName" placeholder="John Doe" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="indEmail" placeholder="you@example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="indPassword" placeholder="••••••••••••" required onchange="checkPasswordStrength('indPassword')">
                        <div class="password-strength">
                            <div id="indStrengthBar" class="strength-bar"></div>
                        </div>
                        <div id="indStrengthText" class="strength-text"></div>
                        <div id="indFeedback" class="feedback"></div>
                    </div>
                    
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="indPasswordConfirm" placeholder="••••••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Create Account</button>
                </form>
            </div>
            
            <!-- BUSINESS SIGNUP -->
            <div id="business" class="form-section">
                <form id="businessForm" onsubmit="handleBusinessSignup(event)">
                    <h3>Personal Information</h3>
                    
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="bizName" placeholder="John Doe" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="bizEmail" placeholder="john@example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="bizPhone" placeholder="+27 XX XXX XXXX" required>
                    </div>
                    
                    <h3 style="margin-top: 25px;">Business Information</h3>
                    
                    <div class="form-group">
                        <label>Business Name</label>
                        <input type="text" id="bizBusinessName" placeholder="Your Business Ltd" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Business Type / Industry</label>
                        <select id="bizBusinessType" required>
                            <option value="">Select industry...</option>
                            <option value="Retail">Retail & E-Commerce</option>
                            <option value="Services">Professional Services</option>
                            <option value="Technology">Technology & Software</option>
                            <option value="Manufacturing">Manufacturing</option>
                            <option value="Healthcare">Healthcare & Wellness</option>
                            <option value="Finance">Finance & Insurance</option>
                            <option value="Hospitality">Hospitality & Tourism</option>
                            <option value="Education">Education & Training</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Business Email</label>
                        <input type="email" id="bizBusinessEmail" placeholder="business@company.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Business Registration Number</label>
                        <input type="text" id="bizRegistration" placeholder="Registration ID or Tax Number" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Country</label>
                        <input type="text" id="bizCountry" placeholder="South Africa" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="bizPassword" placeholder="••••••••••••" required onchange="checkPasswordStrength('bizPassword')">
                        <div class="password-strength">
                            <div id="bizStrengthBar" class="strength-bar"></div>
                        </div>
                        <div id="bizStrengthText" class="strength-text"></div>
                        <div id="bizFeedback" class="feedback"></div>
                    </div>
                    
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="bizPasswordConfirm" placeholder="••••••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Create Business Account</button>
                </form>
            </div>
            
            <!-- LOGIN -->
            <div id="login" class="form-section">
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="loginEmail" placeholder="you@example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••••••••" required>
                    </div>
                    
                    <div class="form-group" style="display: flex; align-items: center;">
                        <input type="checkbox" id="rememberMe" style="width: auto; margin: 0; margin-right: 8px;">
                        <label for="rememberMe" style="display: inline; margin: 0; text-transform: none; letter-spacing: normal;">Remember me</label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Sign In</button>
                    <button type="button" class="btn btn-secondary" onclick="location.href='/forgot-password.html'">Forgot Password?</button>
                    <button type="button" class="btn btn-secondary" onclick="switchForm('individual')">Create Account</button>
                </form>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = "https://wandatools.up.railway.app/api/v1";
        
        function switchForm(formName) {
            document.querySelectorAll('.form-section').forEach(el => {
                el.classList.remove('active');
            });
            document.getElementById(formName).classList.add('active');
            
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('active');
            });
            event.target.classList.add('active');
        }
        
        function showAlert(message, type = 'error') {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            container.innerHTML = '';
            container.appendChild(alert);
            
            setTimeout(() => alert.remove(), 5000);
        }
        
        async function checkPasswordStrength(fieldId) {
            const password = document.getElementById(fieldId).value;
            
            try {
                const response = await fetch(`${API_BASE}/auth/check-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                const data = await response.json();
                
                const barId = `${fieldId.split('Password')[0]}StrengthBar`;
                const textId = `${fieldId.split('Password')[0]}StrengthText`;
                const feedbackId = `${fieldId.split('Password')[0]}Feedback`;
                
                const bar = document.getElementById(barId);
                const text = document.getElementById(textId);
                const feedback = document.getElementById(feedbackId);
                
                bar.className = `strength-bar strength-${data.score}`;
                
                const strengthLabels = ['Very Weak', 'Weak', 'Fair', 'Good', 'Strong'];
                const strengthClasses = ['strength-weak', 'strength-weak', 'strength-fair', 'strength-good', 'strength-strong'];
                
                text.className = `strength-text ${strengthClasses[data.score]}`;
                text.textContent = strengthLabels[data.score];
                
                feedback.textContent = data.feedback.join(', ');
                
            } catch (error) {
                console.error('Error checking password:', error);
            }
        }
        
        async function handleIndividualSignup(event) {
            event.preventDefault();
            
            const name = document.getElementById('indName').value;
            const email = document.getElementById('indEmail').value;
            const password = document.getElementById('indPassword').value;
            const passwordConfirm = document.getElementById('indPasswordConfirm').value;
            
            if (password !== passwordConfirm) {
                showAlert('Passwords do not match');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/auth/signup/individual`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, password_confirm: passwordConfirm })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    showAlert(data.detail || 'Signup failed');
                    return;
                }
                
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);
                localStorage.setItem('user_email', data.user.email);
                
                showAlert('✅ Account created! Check email to verify. Redirecting...', 'success');
                setTimeout(() => location.href = '/verify-email.html', 2000);
                
            } catch (error) {
                showAlert('Network error: ' + error.message);
            }
        }
        
        async function handleBusinessSignup(event) {
            event.preventDefault();
            
            const formData = {
                name: document.getElementById('bizName').value,
                email: document.getElementById('bizEmail').value,
                password: document.getElementById('bizPassword').value,
                password_confirm: document.getElementById('bizPasswordConfirm').value,
                phone: document.getElementById('bizPhone').value,
                business_name: document.getElementById('bizBusinessName').value,
                business_type: document.getElementById('bizBusinessType').value,
                business_email: document.getElementById('bizBusinessEmail').value,
                business_registration: document.getElementById('bizRegistration').value,
                country: document.getElementById('bizCountry').value
            };
            
            if (formData.password !== formData.password_confirm) {
                showAlert('Passwords do not match');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/auth/signup/business`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    showAlert(data.detail || 'Signup failed');
                    return;
                }
                
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);
                localStorage.setItem('user_email', data.user.email);
                
                showAlert('✅ Business account created! Check email to verify. Redirecting...', 'success');
                setTimeout(() => location.href = '/verify-email.html', 2000);
                
            } catch (error) {
                showAlert('Network error: ' + error.message);
            }
        }
        
        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    showAlert('Invalid credentials');
                    return;
                }
                
                if (data.mfa_required) {
                    sessionStorage.setItem('mfa_email', email);
                    showAlert('MFA verification required. Check your email.');
                    return;
                }
                
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);
                localStorage.setItem('user_email', data.user.email);
                
                showAlert('✅ Login successful! Redirecting...', 'success');
                setTimeout(() => location.href = '/tools.html', 1500);
                
            } catch (error) {
                showAlert('Network error: ' + error.message);
            }
        }
    </script>
</body>
</html>
