<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create your WandaTools account - AI-powered financial management" />
  <meta name="theme-color" content="#007BFF" />
  <!-- PWA Manifest & cross-platform meta -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="WandaTools" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <title>Create Account – WandaTools</title>

  <!-- Shared stylesheet (defines all CSS variables, navbar, buttons, forms) -->
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

  <style>
    /* ── Page background ── */
    body {
      background: linear-gradient(135deg, #007BFF 0%, #28A745 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Push content below fixed navbar ── */
    .signup-main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    /* ── Card ── */
    .signup-card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.18);
      padding: 44px 40px;
      width: 100%;
      max-width: 520px;
    }
    .signup-card h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }
    .signup-card .subtitle {
      color: #666666;
      font-size: 0.875rem;
      margin-bottom: 28px;
    }

    /* ── Alerts ── */
    #alertContainer { margin-bottom: 16px; }
    .alert {
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-size: 0.8rem;
      border-left: 4px solid;
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from { transform: translateX(-16px); opacity: 0; }
      to   { transform: translateX(0);     opacity: 1; }
    }
    .alert-error   { background: #FFEBEE; color: #C62828; border-left-color: #F44336; }
    .alert-success { background: #E8F5E9; color: #2E7D32; border-left-color: #28A745; }

    /* ── Tabs ── */
    .form-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 2px solid #F0F0F0;
    }
    .tab-btn {
      flex: 1;
      padding: 12px 0;
      border: none;
      background: transparent;
      color: #999999;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.75rem;
      font-family: 'Open Sans', sans-serif;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.25s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .tab-btn.active { color: #007BFF; border-bottom-color: #007BFF; }
    .tab-btn:hover:not(.active) { color: #333333; }

    /* ── Form sections ── */
    .form-section { display: none; }
    .form-section.active { display: block; }

    /* ── Form groups (override styles.css for tighter signup look) ── */
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      color: #333333;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.75rem;
      font-family: 'Open Sans', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #E0E0E0;
      border-radius: 8px;
      font-size: 0.875rem;
      font-family: 'Open Sans', sans-serif;
      background: #ffffff;
      color: #333333;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
      outline: none;
    }
    .form-group input:focus,
    .form-group select:focus {
      border-color: #007BFF;
      box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
    }
    .form-group input::placeholder { color: #AAAAAA; }
    .form-group input[type="checkbox"] {
      width: auto;
      margin-right: 8px;
    }

    /* ── Section sub-heading ── */
    .form-section-title {
      font-family: 'Poppins', sans-serif;
      color: #333333;
      font-size: 0.875rem;
      font-weight: 600;
      margin: 20px 0 14px;
    }

    /* ── Password strength ── */
    .password-strength {
      margin-top: 6px;
      height: 3px;
      background: #E0E0E0;
      border-radius: 3px;
      overflow: hidden;
    }
    .strength-bar { height: 100%; width: 0%; transition: all 0.3s; border-radius: 3px; }
    .strength-0 { width: 20%;  background: #F44336; }
    .strength-1 { width: 40%;  background: #FF9800; }
    .strength-2 { width: 60%;  background: #FFC107; }
    .strength-3 { width: 80%;  background: #28A745; }
    .strength-4 { width: 100%; background: #007BFF; }
    .strength-text { font-size: 0.7rem; margin-top: 4px; font-weight: 600; font-family: 'Open Sans', sans-serif; }
    .strength-weak   { color: #F44336; }
    .strength-fair   { color: #FF9800; }
    .strength-good   { color: #28A745; }
    .strength-strong { color: #007BFF; }
    .feedback { font-size: 0.7rem; color: #999999; margin-top: 4px; font-family: 'Open Sans', sans-serif; line-height: 1.4; }

    /* ── Buttons inside signup card ── */
    .signup-card .btn {
      width: 100%;
      margin-top: 8px;
      justify-content: center;
    }
    .signup-card .btn-secondary {
      background: #F5F5F5;
      color: #333333;
      border: 1.5px solid #E0E0E0;
      box-shadow: none;
      margin-top: 10px;
    }
    .signup-card .btn-secondary:hover {
      background: #EEEEEE;
      transform: none;
      box-shadow: none;
    }
    .signup-card .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ── Toggle link ── */
    .toggle-form {
      text-align: center;
      margin-top: 20px;
      color: #999999;
      font-size: 0.8rem;
    }
    .toggle-form a {
      color: #007BFF;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .toggle-form a:hover { text-decoration: underline; }

    /* ── Remember me row ── */
    .remember-row {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
    }
    .remember-row input { width: auto; margin: 0 8px 0 0; }
    .remember-row label {
      margin: 0;
      text-transform: none;
      letter-spacing: normal;
      font-weight: 400;
      font-size: 0.8rem;
    }

    /* ── Footer ── */
    .signup-footer {
      background: rgba(0,0,0,0.12);
      color: rgba(255,255,255,0.85);
      padding: 18px 20px;
      text-align: center;
      font-size: 0.75rem;
      font-family: 'Open Sans', sans-serif;
    }

    @media (max-width: 560px) {
      .signup-card { padding: 32px 20px; }
      .signup-card h1 { font-size: 1.4rem; }
      .tab-btn { font-size: 0.7rem; padding: 10px 0; }
    }
  </style>
</head>
<body>

<!-- ══════════════════ NAVBAR (injected by nav.js) ══════════════════ -->
<nav class="navbar" role="navigation" aria-label="Main navigation">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">wandatools<span>Tools</span></a>
    <ul class="nav-links" role="list"></ul>
    <div id="navAuth"></div>
    <button class="nav-hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="nav-mobile" id="mobileNav" aria-hidden="true"></div>
</nav>

<!-- ══════════════════ MAIN ══════════════════ -->
<div class="page-content signup-main">
  <div style="width:100%;max-width:520px;">
    <div class="signup-card">
      <h1>WandaTools</h1>
      <p class="subtitle">Secure Financial Management Platform</p>

      <!-- Alerts -->
      <div id="alertContainer"></div>

      <!-- Tabs -->
      <div class="form-tabs">
        <button class="tab-btn active" onclick="switchForm('individual', this)">Individual</button>
        <button class="tab-btn"        onclick="switchForm('business',   this)">Business</button>
        <button class="tab-btn"        onclick="switchForm('login',      this)">Sign In</button>
      </div>

      <!-- ══ INDIVIDUAL SIGNUP ══ -->
      <div id="individual" class="form-section active">
        <form id="individualForm" onsubmit="handleIndividualSignup(event)" novalidate>
          <div class="form-group">
            <label for="indName">Full Name</label>
            <input type="text"     id="indName"            name="name"            placeholder="John Doe"        required minlength="2" maxlength="100" />
          </div>
          <div class="form-group">
            <label for="indEmail">Email Address</label>
            <input type="email"    id="indEmail"           name="email"           placeholder="you@example.com" required maxlength="255" autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="indPassword">Password</label>
            <input type="password" id="indPassword"        name="password"        placeholder="••••••••••••"    required minlength="12" autocomplete="new-password"
                   oninput="updateStrengthUI('indPassword', this.value)" />
            <div class="password-strength"><div id="indStrengthBar" class="strength-bar"></div></div>
            <div id="indStrengthText" class="strength-text"></div>
            <div id="indFeedback"    class="feedback"></div>
          </div>
          <div class="form-group">
            <label for="indPasswordConfirm">Confirm Password</label>
            <input type="password" id="indPasswordConfirm" name="passwordConfirm" placeholder="••••••••••••"    required minlength="12" autocomplete="new-password" />
          </div>
          <button type="submit" class="btn btn-primary" id="indSubmitBtn">Create Account</button>
        </form>
      </div>

      <!-- ══ BUSINESS SIGNUP ══ -->
      <div id="business" class="form-section">
        <form id="businessForm" onsubmit="handleBusinessSignup(event)" novalidate>
          <p class="form-section-title">Personal Information</p>
          <div class="form-group">
            <label for="bizName">Full Name</label>
            <input type="text"  id="bizName"            name="name"                placeholder="John Doe"              required minlength="2" maxlength="100" />
          </div>
          <div class="form-group">
            <label for="bizEmail">Email Address</label>
            <input type="email" id="bizEmail"           name="email"               placeholder="john@example.com"      required maxlength="255" autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="bizPhone">Phone Number</label>
            <input type="tel"   id="bizPhone"           name="phone"               placeholder="+268 7XXX XXXX"        required pattern="[0-9+\s\-]+" />
          </div>

          <p class="form-section-title">Business Information</p>
          <div class="form-group">
            <label for="bizBusinessName">Business Name</label>
            <input type="text"  id="bizBusinessName"   name="businessName"         placeholder="Your Business Ltd"     required minlength="2" maxlength="255" />
          </div>
          <div class="form-group">
            <label for="bizBusinessType">Business Type / Industry</label>
            <select id="bizBusinessType" name="businessType" required>
              <option value="">Select industry...</option>
              <option value="Retail">Retail &amp; E-Commerce</option>
              <option value="Services">Professional Services</option>
              <option value="Technology">Technology &amp; Software</option>
              <option value="Manufacturing">Manufacturing</option>
              <option value="Healthcare">Healthcare &amp; Wellness</option>
              <option value="Finance">Finance &amp; Insurance</option>
              <option value="Hospitality">Hospitality &amp; Tourism</option>
              <option value="Education">Education &amp; Training</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="bizBusinessEmail">Business Email</label>
            <input type="email" id="bizBusinessEmail"  name="businessEmail"        placeholder="business@company.com"  required maxlength="255" />
          </div>
          <div class="form-group">
            <label for="bizRegistration">Business Registration Number</label>
            <input type="text"  id="bizRegistration"   name="businessRegistration" placeholder="Registration / Tax No." required minlength="3" maxlength="100" />
          </div>
          <div class="form-group">
            <label for="bizCountry">Country</label>
            <input type="text"  id="bizCountry"        name="country"              placeholder="Eswatini"              required maxlength="100" />
          </div>
          <div class="form-group">
            <label for="bizPassword">Password</label>
            <input type="password" id="bizPassword"        name="password"         placeholder="••••••••••••" required minlength="12" autocomplete="new-password"
                   oninput="updateStrengthUI('bizPassword', this.value)" />
            <div class="password-strength"><div id="bizStrengthBar" class="strength-bar"></div></div>
            <div id="bizStrengthText" class="strength-text"></div>
            <div id="bizFeedback"    class="feedback"></div>
          </div>
          <div class="form-group">
            <label for="bizPasswordConfirm">Confirm Password</label>
            <input type="password" id="bizPasswordConfirm" name="passwordConfirm"  placeholder="••••••••••••" required minlength="12" autocomplete="new-password" />
          </div>
          <button type="submit" class="btn btn-primary" id="bizSubmitBtn">Create Business Account</button>
        </form>
      </div>

      <!-- ══ LOGIN ══ -->
      <div id="login" class="form-section">
        <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
          <div class="form-group">
            <label for="loginEmail">Email Address</label>
            <input type="email"    id="loginEmail"    name="email"    placeholder="you@example.com" required maxlength="255" autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" name="password" placeholder="••••••••••••"    required minlength="8"   autocomplete="current-password" />
          </div>
          <div class="remember-row">
            <input type="checkbox" id="rememberMe" name="rememberMe" />
            <label for="rememberMe">Remember me</label>
          </div>
          <button type="submit"  class="btn btn-primary"   id="loginSubmitBtn">Sign In</button>
          <button type="button"  class="btn btn-secondary" onclick="location.href='forget-password.html'">Forgot Password?</button>
        </form>
      </div>

      <div class="toggle-form">
        Don't have an account? <a onclick="switchForm('individual', null)">Create one</a>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════ FOOTER ══════════════════ -->
<footer class="signup-footer">
  &copy; 2025 WandaTools. All rights reserved. | Made for Eswatini 🇸🇿
</footer>

<!-- nav.js MUST load first — it defines API_BASE, apiCall, showAlert, showToast, protectFromAuth, updateStrengthUI -->
<script src="nav.js"></script>
<script src="/pwa.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Redirect already-logged-in users away from this page
    if (typeof protectFromAuth === 'function') protectFromAuth();
  });

  /* ── Tab switching ─────────────────────────────────────────── */
  function switchForm(formName, btn) {
    document.querySelectorAll('.form-section').forEach(el => el.classList.remove('active'));
    const target = document.getElementById(formName);
    if (target) target.classList.add('active');

    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    if (btn) btn.classList.add('active');

    document.querySelector('.signup-card')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  /* ── Extract readable error from backend response ──────────── */
  function extractError(result, fallback) {
    if (!result) return fallback;
    if (typeof result.detail === 'string') return result.detail;
    if (Array.isArray(result.detail)) return result.detail.map(e => e.msg || String(e)).join(' • ');
    return result.message || fallback;
  }

  /* ── Individual signup ─────────────────────────────────────── */
  async function handleIndividualSignup(event) {
    event.preventDefault();

    const name     = document.getElementById('indName').value.trim();
    const email    = document.getElementById('indEmail').value.trim();
    const password = document.getElementById('indPassword').value;
    const confirm  = document.getElementById('indPasswordConfirm').value;

    if (name.length < 2)                            { showAlert('Name must be at least 2 characters'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showAlert('Please enter a valid email address'); return; }
    if (password.length < 12)                       { showAlert('Password must be at least 12 characters'); return; }
    if (password !== confirm)                       { showAlert('Passwords do not match'); return; }

    const btn = document.getElementById('indSubmitBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="material-icons" style="font-size:1rem;vertical-align:middle;">hourglass_empty</i> Creating account...';

    try {
      const response = await fetch(`${API_BASE}/auth/register`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ name, email, password, timezone: 'Africa/Johannesburg', currency: 'E' }),
      });
      const result = await response.json();

      if (response.ok) {
        WandaAuth.auth.login(result);
        showAlert('✅ Account created!', 'success');
        if (window.WandaPIN) await WandaPIN.promptSetup();
        location.href = 'tools.html';
      } else {
        showAlert(extractError(result, 'Signup failed'), 'error');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    } catch {
      showAlert('Network error — please check your connection and try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }

  /* ── Business signup ───────────────────────────────────────── */
  async function handleBusinessSignup(event) {
    event.preventDefault();

    const name         = document.getElementById('bizName').value.trim();
    const email        = document.getElementById('bizEmail').value.trim();
    const businessName = document.getElementById('bizBusinessName').value.trim();
    const businessType = document.getElementById('bizBusinessType').value;
    const password     = document.getElementById('bizPassword').value;
    const confirm      = document.getElementById('bizPasswordConfirm').value;

    if (name.length < 2)                            { showAlert('Name must be at least 2 characters'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showAlert('Please enter a valid email'); return; }
    if (businessName.length < 2)                    { showAlert('Business name must be at least 2 characters'); return; }
    if (!businessType)                              { showAlert('Please select a business type'); return; }
    if (password.length < 12)                       { showAlert('Password must be at least 12 characters'); return; }
    if (password !== confirm)                       { showAlert('Passwords do not match'); return; }

    const btn = document.getElementById('bizSubmitBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="material-icons" style="font-size:1rem;vertical-align:middle;">hourglass_empty</i> Creating account...';

    try {
      const response = await fetch(`${API_BASE}/auth/register`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          name,
          email,
          password,
          business_name:         businessName,
          business_type:         businessType,
          business_email:        document.getElementById('bizBusinessEmail').value.trim(),
          phone:                 document.getElementById('bizPhone').value.trim(),
          business_registration: document.getElementById('bizRegistration').value.trim(),
          country:               document.getElementById('bizCountry').value.trim(),
          timezone:              'Africa/Johannesburg',
          currency:              'E',
        }),
      });
      const result = await response.json();

      if (response.ok) {
        WandaAuth.auth.login(result);
        showAlert('✅ Business account created!', 'success');
        if (window.WandaPIN) await WandaPIN.promptSetup();
        location.href = 'tools.html';
      } else {
        showAlert(extractError(result, 'Signup failed'), 'error');
        btn.disabled = false;
        btn.textContent = 'Create Business Account';
      }
    } catch {
      showAlert('Network error — please check your connection and try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Create Business Account';
    }
  }

  /* ── Login ─────────────────────────────────────────────────── */
  async function handleLogin(event) {
    event.preventDefault();

    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) { showAlert('Please fill in all fields'); return; }

    const btn = document.getElementById('loginSubmitBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="material-icons" style="font-size:1rem;vertical-align:middle;">hourglass_empty</i> Signing in...';

    try {
      const response = await fetch(`${API_BASE}/auth/login`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password }),
      });
      const result = await response.json();

      if (response.ok) {
        WandaAuth.auth.login(result);
        showAlert('✅ Login successful!', 'success');
        if (window.WandaPIN) await WandaPIN.promptSetup();
        location.href = 'tools.html';
      } else {
        showAlert(extractError(result, 'Login failed — please check your credentials'), 'error');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    } catch {
      showAlert('Network error — please check your connection and try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }
</script>
</body>
</html>
